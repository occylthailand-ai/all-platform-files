let pddCur=0;
function pddBuild(){
  const tabs=document.getElementById('pdd-tabs');
  const phases=document.getElementById('pdd-phases');
  tabs.innerHTML='';phases.innerHTML='';
  pddPhases.forEach((p,i)=>{
    const tab=document.createElement('button');
    tab.className='pdd-tab'+(i===0?' active':'');
    tab.textContent=p.label;tab.onclick=()=>pddGo(i);
    tabs.appendChild(tab);
    const aiCnt=p.steps.filter(s=>s.ai).length;
    const div=document.createElement('div');
    div.className='pdd-phase'+(i===0?' visible':'');
    div.innerHTML=`<div class="phase-hd"><div class="ph-icon">${p.icon}</div><div><p class="ph-name">${p.name}</p><p class="ph-desc">${p.desc}</p></div>${aiCnt>0?`<span class="ph-cnt">🤖 AI ช่วย ${aiCnt} ขั้น</span>`:''}</div><div class="steps-grid">${p.steps.map(s=>`<div class="step-card"><div class="step-top"><div class="step-num">${s.n}</div><span class="step-title">${s.t}</span></div><p class="step-desc">${s.d}</p>${s.ai?'<span class="ai-tag">🤖 AI ช่วยได้</span>':''}${s.warn?'<span class="warn-tag">⚠️ ข้อควรรู้</span>':''}</div>`).join('')}</div>`;
    phases.appendChild(div);
  });
  pddUpdateNav();
}
function pddGo(i){
  document.querySelectorAll('.pdd-phase').forEach((el,idx)=>el.classList.toggle('visible',idx===i));
  document.querySelectorAll('.pdd-tab').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  pddCur=i;pddUpdateNav();
}
function pddChange(d){pddGo(Math.max(0,Math.min(pddPhases.length-1,pddCur+d)));}
function pddUpdateNav(){
  document.getElementById('pdd-prog').textContent=`ส่วนที่ ${pddCur+1} จาก ${pddPhases.length}`;
  document.getElementById('pdd-prev').style.opacity=pddCur===0?'0.3':'1';
  document.getElementById('pdd-next').textContent=pddCur===pddPhases.length-1?'🎉 เริ่มขายเลย!':'ถัดไป →';
}
pddBuild();
