let wcCur=0;
function wcBuild(){
  const tabs=document.getElementById('wc-tabs');
  const phases=document.getElementById('wc-phases');
  tabs.innerHTML='';phases.innerHTML='';
  wcPhases.forEach((p,i)=>{
    const tab=document.createElement('button');
    tab.className='wc-tab'+(i===0?' active':'');
    tab.textContent=p.label;tab.onclick=()=>wcGo(i);
    tabs.appendChild(tab);
    const aiCnt=p.steps.filter(s=>s.ai).length;
    const div=document.createElement('div');
    div.className='wc-phase'+(i===0?' visible':'');
    div.innerHTML=`<div class="phase-hd"><div class="ph-icon">${p.icon}</div><div><p class="ph-name">${p.name}</p><p class="ph-desc">${p.desc}</p></div>${aiCnt>0?`<span class="ph-cnt">🤖 AI ช่วย ${aiCnt} ขั้น</span>`:''}</div><div class="steps-grid">${p.steps.map(s=>`<div class="step-card"><div class="step-top"><div class="step-num">${s.n}</div><span class="step-title">${s.t}</span></div><p class="step-desc">${s.d}</p>${s.ai?'<span class="ai-tag">🤖 AI ช่วยได้</span>':''}${s.note?'<span class="note-tag">⚠️ ข้อควรรู้</span>':''}</div>`).join('')}</div>`;
    phases.appendChild(div);
  });
  wcUpdateNav();
}
function wcGo(i){
  document.querySelectorAll('.wc-phase').forEach((el,idx)=>el.classList.toggle('visible',idx===i));
  document.querySelectorAll('.wc-tab').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  wcCur=i;wcUpdateNav();
}
function wcChange(d){wcGo(Math.max(0,Math.min(wcPhases.length-1,wcCur+d)));}
function wcUpdateNav(){
  document.getElementById('wc-prog').textContent=`ส่วนที่ ${wcCur+1} จาก ${wcPhases.length}`;
  document.getElementById('wc-prev').style.opacity=wcCur===0?'0.3':'1';
  document.getElementById('wc-next').textContent=wcCur===wcPhases.length-1?'🎉 เริ่มขายเลย!':'ถัดไป →';
}
wcBuild();
