let dbCur=0;
function dbBuild(){
  const tabs=document.getElementById('db-tabs');
  const phases=document.getElementById('db-phases');
  tabs.innerHTML='';phases.innerHTML='';
  dbPhases.forEach((p,i)=>{
    const tab=document.createElement('button');
    tab.className='db-tab'+(i===0?' active':'');
    tab.textContent=p.label;tab.onclick=()=>dbGo(i);
    tabs.appendChild(tab);
    const aiCnt=p.steps.filter(s=>s.ai).length;
    const div=document.createElement('div');
    div.className='db-phase'+(i===0?' visible':'');
    div.innerHTML=`<div class="phase-hd"><div class="ph-icon">${p.icon}</div><div><p class="ph-name">${p.name}</p><p class="ph-desc">${p.desc}</p></div>${aiCnt>0?`<span class="ph-cnt">🤖 AI ช่วย ${aiCnt} ขั้น</span>`:''}</div><div class="steps-grid">${p.steps.map(s=>`<div class="step-card"><div class="step-top"><div class="step-num">${s.n}</div><span class="step-title">${s.t}</span></div><p class="step-desc">${s.d}</p>${s.ai?'<span class="ai-tag">🤖 AI ช่วยได้</span>':''}</div>`).join('')}</div>`;
    phases.appendChild(div);
  });
  dbUpdateNav();
}
function dbGo(i){
  document.querySelectorAll('.db-phase').forEach((el,idx)=>el.classList.toggle('visible',idx===i));
  document.querySelectorAll('.db-tab').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  dbCur=i;dbUpdateNav();
}
function dbChange(d){dbGo(Math.max(0,Math.min(dbPhases.length-1,dbCur+d)));}
function dbUpdateNav(){
  document.getElementById('db-prog').textContent=`ส่วนที่ ${dbCur+1} จาก ${dbPhases.length}`;
  document.getElementById('db-prev').style.opacity=dbCur===0?'0.3':'1';
  document.getElementById('db-next').textContent=dbCur===dbPhases.length-1?'🎉 เริ่มขายเลย!':'ถัดไป →';
}
dbBuild();
</script>
