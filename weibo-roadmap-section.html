let wbCur=0;
function wbBuild(){
  const tabs=document.getElementById('wb-tabs');
  const phases=document.getElementById('wb-phases');
  tabs.innerHTML='';phases.innerHTML='';
  wbPhases.forEach((p,i)=>{
    const tab=document.createElement('button');
    tab.className='wb-tab'+(i===0?' active':'');
    tab.textContent=p.label;tab.onclick=()=>wbGo(i);
    tabs.appendChild(tab);
    const aiCnt=p.steps.filter(s=>s.ai).length;
    const div=document.createElement('div');
    div.className='wb-phase'+(i===0?' visible':'');
    div.innerHTML=`<div class="phase-hd"><div class="ph-icon">${p.icon}</div><div><p class="ph-name">${p.name}</p><p class="ph-desc">${p.desc}</p></div>${aiCnt>0?`<span class="ph-cnt">🤖 AI ช่วย ${aiCnt} ขั้น</span>`:''}</div><div class="steps-grid">${p.steps.map(s=>`<div class="step-card"><div class="step-top"><div class="step-num">${s.n}</div><span class="step-title">${s.t}</span></div><p class="step-desc">${s.d}</p>${s.ai?'<span class="ai-tag">🤖 AI ช่วยได้</span>':''}${s.warn?'<span class="warn-tag">⚠️ ข้อควรรู้</span>':''}</div>`).join('')}</div>`;
    phases.appendChild(div);
  });
  wbUpdateNav();
}
function wbGo(i){
  document.querySelectorAll('.wb-phase').forEach((el,idx)=>el.classList.toggle('visible',idx===i));
  document.querySelectorAll('.wb-tab').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  wbCur=i;wbUpdateNav();
}
function wbChange(d){wbGo(Math.max(0,Math.min(wbPhases.length-1,wbCur+d)));}
function wbUpdateNav(){
