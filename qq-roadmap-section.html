let qqCur=0;
function qqBuild(){
  const tabs=document.getElementById('qq-tabs');
  const phases=document.getElementById('qq-phases');
  tabs.innerHTML='';phases.innerHTML='';
  qqPhases.forEach((p,i)=>{
    const tab=document.createElement('button');
    tab.className='qq-tab'+(i===0?' active':'');
    tab.textContent=p.label;tab.onclick=()=>qqGo(i);
    tabs.appendChild(tab);
    const aiCnt=p.steps.filter(s=>s.ai).length;
    const div=document.createElement('div');
    div.className='qq-phase'+(i===0?' visible':'');
    div.innerHTML=`<div class="phase-hd"><div class="ph-icon">${p.icon}</div><div><p class="ph-name">${p.name}</p><p class="ph-desc">${p.desc}</p></div>${aiCnt>0?`<span class="ph-cnt">🤖 AI ช่วย ${aiCnt} ขั้น</span>`:''}</div><div class="steps-grid">${p.steps.map(s=>`<div class="step-card"><div class="step-top"><div class="step-num">${s.n}</div><span class="step-title">${s.t}</span></div><p class="step-desc">${s.d}</p>${s.ai?'<span class="ai-tag">🤖 AI ช่วยได้</span>':''}</div>`).join('')}</div>`;
    phases.appendChild(div);
  });
  qqUpdateNav();
}
function qqGo(i){
  document.querySelectorAll('.qq-phase').forEach((el,idx)=>el.classList.toggle('visible',idx===i));
  document.querySelectorAll('.qq-tab').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  qqCur=i;qqUpdateNav();
}
function qqChange(d){qqGo(Math.max(0,Math.min(qqPhases.length-1,qqCur+d)));}
function qqUpdateNav(){
  document.getElementById('qq-prog').textContent=`ส่วนที่ ${qqCur+1} จาก ${qqPhases.length}`;
  document.getElementById('qq-prev').style.opacity=qqCur===0?'0.3':'1';
  document.getElementById('qq-next').textContent=qqCur===qqPhases.length-1?'🎉 เริ่มขายเลย!':'ถัดไป →';
}
qqBuild();
