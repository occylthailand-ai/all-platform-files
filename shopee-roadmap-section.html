let spCur=0;
function spBuild(){
  const tabs=document.getElementById('sp-tabs');
  const phases=document.getElementById('sp-phases');
  tabs.innerHTML='';phases.innerHTML='';
  spPhases.forEach((p,i)=>{
    const tab=document.createElement('button');
    tab.className='sp-tab'+(i===0?' active':'');
    tab.textContent=p.label;tab.onclick=()=>spGo(i);
    tabs.appendChild(tab);
    const aiCnt=p.steps.filter(s=>s.ai).length;
    const div=document.createElement('div');
    div.className='sp-phase'+(i===0?' visible':'');
    div.innerHTML=`<div class="phase-hd"><div class="ph-icon">${p.icon}</div><div><p class="ph-name">${p.name}</p><p class="ph-desc">${p.desc}</p></div>${aiCnt>0?`<span class="ph-cnt">🤖 AI ช่วย ${aiCnt} ขั้น</span>`:''}</div><div class="steps-grid">${p.steps.map(s=>`<div class="step-card"><div class="step-top"><div class="step-num">${s.n}</div><span class="step-title">${s.t}</span></div><p class="step-desc">${s.d}</p>${s.ai?'<span class="ai-tag">🤖 AI ช่วยได้</span>':''}${s.warn?'<span class="warn-tag">⚠️ ข้อควรรู้</span>':''}</div>`).join('')}</div>`;
    phases.appendChild(div);
  });
  spUpdateNav();
}
function spGo(i){
  document.querySelectorAll('.sp-phase').forEach((el,idx)=>el.classList.toggle('visible',idx===i));
  document.querySelectorAll('.sp-tab').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  spCur=i;spUpdateNav();
}
function spChange(d){spGo(Math.max(0,Math.min(spPhases.length-1,spCur+d)));}
function spUpdateNav(){
  document.getElementById('sp-prog').textContent=`ส่วนที่ ${spCur+1} จาก ${spPhases.length}`;
  document.getElementById('sp-prev').style.opacity=spCur===0?'0.3':'1';
  document.getElementById('sp-next').textContent=spCur===spPhases.length-1?'🎉 เริ่มขายเลย!':'ถัดไป →';
}
spBuild();
