let zhCur=0;
function zhBuild(){
  const tabs=document.getElementById('zh-tabs');
  const phases=document.getElementById('zh-phases');
  tabs.innerHTML='';phases.innerHTML='';
  zhPhases.forEach((p,i)=>{
    const tab=document.createElement('button');
    tab.className='zh-tab'+(i===0?' active':'');
    tab.textContent=p.label;tab.onclick=()=>zhGo(i);
    tabs.appendChild(tab);
    const aiCnt=p.steps.filter(s=>s.ai).length;
    const div=document.createElement('div');
    div.className='zh-phase'+(i===0?' visible':'');
    div.innerHTML=`<div class="phase-hd"><div class="ph-icon">${p.icon}</div><div><p class="ph-name">${p.name}</p><p class="ph-desc">${p.desc}</p></div>${aiCnt>0?`<span class="ph-cnt">🤖 AI ช่วย ${aiCnt} ขั้น</span>`:''}</div><div class="steps-grid">${p.steps.map(s=>`<div class="step-card"><div class="step-top"><div class="step-num">${s.n}</div><span class="step-title">${s.t}</span></div><p class="step-desc">${s.d}</p>${s.ai?'<span class="ai-tag">🤖 AI ช่วยได้</span>':''}${s.tip?'<span class="tip-tag">💡 เคล็ดลับ</span>':''}</div>`).join('')}</div>`;
    phases.appendChild(div);
  });
  zhUpdateNav();
}
function zhGo(i){
  document.querySelectorAll('.zh-phase').forEach((el,idx)=>el.classList.toggle('visible',idx===i));
  document.querySelectorAll('.zh-tab').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  zhCur=i;zhUpdateNav();
}
function zhChange(d){zhGo(Math.max(0,Math.min(zhPhases.length-1,zhCur+d)));}
function zhUpdateNav(){
  document.getElementById('zh-prog').textContent=`ส่วนที่ ${zhCur+1} จาก ${zhPhases.length}`;
  document.getElementById('zh-prev').style.opacity=zhCur===0?'0.3':'1';
  document.getElementById('zh-next').textContent=zhCur===zhPhases.length-1?'🎉 เริ่มขายเลย!':'ถัดไป →';
}
zhBuild();
