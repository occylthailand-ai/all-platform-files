let thCur=0;
function thBuild(){
  const tabs=document.getElementById('th-tabs');
  const phases=document.getElementById('th-phases');
  tabs.innerHTML='';phases.innerHTML='';
  thPhases.forEach((p,i)=>{
    const tab=document.createElement('button');
    tab.className='th-tab'+(i===0?' active':'');
    tab.textContent=p.label;tab.onclick=()=>thGo(i);
    tabs.appendChild(tab);
    const aiCnt=p.steps.filter(s=>s.ai).length;
    const div=document.createElement('div');
    div.className='th-phase'+(i===0?' visible':'');
    div.innerHTML=`<div class="phase-hd"><div class="ph-icon">${p.icon}</div><div><p class="ph-name">${p.name}</p><p class="ph-desc">${p.desc}</p></div>${aiCnt>0?`<span class="ph-cnt">🤖 AI ช่วย ${aiCnt} ขั้น</span>`:''}</div><div class="steps-grid">${p.steps.map(s=>`<div class="step-card"><div class="step-top"><div class="step-num">${s.n}</div><span class="step-title">${s.t}</span></div><p class="step-desc">${s.d}</p>${s.ai?'<span class="ai-tag">🤖 AI ช่วยได้</span>':''}</div>`).join('')}</div>`;
    phases.appendChild(div);
  });
  thUpdateNav();
}
function thGo(i){
  document.querySelectorAll('.th-phase').forEach((el,idx)=>el.classList.toggle('visible',idx===i));
  document.querySelectorAll('.th-tab').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  thCur=i;thUpdateNav();
}
function thChange(d){thGo(Math.max(0,Math.min(thPhases.length-1,thCur+d)));}
function thUpdateNav(){
  document.getElementById('th-prog').textContent=`ส่วนที่ ${thCur+1} จาก ${thPhases.length}`;
  document.getElementById('th-prev').style.opacity=thCur===0?'0.3':'1';
  document.getElementById('th-next').textContent=thCur===thPhases.length-1?'🎉 เริ่มขายเลย!':'ถัดไป →';
}
thBuild();
</script>
