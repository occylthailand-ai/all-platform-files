let igCur=0;
function igBuild(){
  const tabs=document.getElementById('ig-tabs');
  const phases=document.getElementById('ig-phases');
  tabs.innerHTML='';phases.innerHTML='';
  igPhases.forEach((p,i)=>{
    const tab=document.createElement('button');
    tab.className='ig-tab'+(i===0?' active':'');
    tab.textContent=p.label;tab.onclick=()=>igGo(i);
    tabs.appendChild(tab);
    const aiCnt=p.steps.filter(s=>s.ai).length;
    const div=document.createElement('div');
    div.className='ig-phase'+(i===0?' visible':'');
    div.innerHTML=`<div class="phase-hd"><div class="ph-icon">${p.icon}</div><div><p class="ph-name">${p.name}</p><p class="ph-desc">${p.desc}</p></div>${aiCnt>0?`<span class="ph-cnt">🤖 AI ช่วย ${aiCnt} ขั้น</span>`:''}</div><div class="steps-grid">${p.steps.map(s=>`<div class="step-card"><div class="step-top"><div class="step-num">${s.n}</div><span class="step-title">${s.t}</span></div><p class="step-desc">${s.d}</p>${s.ai?'<span class="ai-tag">🤖 AI ช่วยได้</span>':''}</div>`).join('')}</div>`;
    phases.appendChild(div);
  });
  igUpdateNav();
}
function igGo(i){
  document.querySelectorAll('.ig-phase').forEach((el,idx)=>el.classList.toggle('visible',idx===i));
  document.querySelectorAll('.ig-tab').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  igCur=i;igUpdateNav();
}
function igChange(d){igGo(Math.max(0,Math.min(igPhases.length-1,igCur+d)));}
function igUpdateNav(){
  document.getElementById('ig-prog').textContent=`ส่วนที่ ${igCur+1} จาก ${igPhases.length}`;
  document.getElementById('ig-prev').style.opacity=igCur===0?'0.3':'1';
  document.getElementById('ig-next').textContent=igCur===igPhases.length-1?'🎉 เริ่มขายเลย!':'ถัดไป →';
}
igBuild();
