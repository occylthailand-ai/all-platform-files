let ksCur=0;
function ksBuild(){
  const tabs=document.getElementById('ks-tabs');
  const phases=document.getElementById('ks-phases');
  tabs.innerHTML='';phases.innerHTML='';
  ksPhases.forEach((p,i)=>{
    const tab=document.createElement('button');
    tab.className='ks-tab'+(i===0?' active':'');
    tab.textContent=p.label;tab.onclick=()=>ksGo(i);
    tabs.appendChild(tab);
    const aiCnt=p.steps.filter(s=>s.ai).length;
    const div=document.createElement('div');
    div.className='ks-phase'+(i===0?' visible':'');
    div.innerHTML=`<div class="phase-hd"><div class="ph-icon">${p.icon}</div><div><p class="ph-name">${p.name}</p><p class="ph-desc">${p.desc}</p></div>${aiCnt>0?`<span class="ph-cnt">🤖 AI ช่วย ${aiCnt} ขั้น</span>`:''}</div><div class="steps-grid">${p.steps.map(s=>`<div class="step-card"><div class="step-top"><div class="step-num">${s.n}</div><span class="step-title">${s.t}</span></div><p class="step-desc">${s.d}</p>${s.ai?'<span class="ai-tag">🤖 AI ช่วยได้</span>':''}${s.warn?'<span class="warn-tag">⚠️ ข้อควรรู้</span>':''}</div>`).join('')}</div>`;
    phases.appendChild(div);
  });
  ksUpdateNav();
}
function ksGo(i){
  document.querySelectorAll('.ks-phase').forEach((el,idx)=>el.classList.toggle('visible',idx===i));
  document.querySelectorAll('.ks-tab').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  ksCur=i;ksUpdateNav();
}
function ksChange(d){ksGo(Math.max(0,Math.min(ksPhases.length-1,ksCur+d)));}
function ksUpdateNav(){
  document.getElementById('ks-prog').textContent=`ส่วนที่ ${ksCur+1} จาก ${ksPhases.length}`;
  document.getElementById('ks-prev').style.opacity=ksCur===0?'0.3':'1';
  document.getElementById('ks-next').textContent=ksCur===ksPhases.length-1?'🎉 เริ่มขายเลย!':'ถัดไป →';
}
ksBuild();
</script>
