let kdCur=0;
function kdBuild(){
  const tabs=document.getElementById('kd-tabs');
  const phases=document.getElementById('kd-phases');
  tabs.innerHTML='';phases.innerHTML='';
  kdPhases.forEach((p,i)=>{
    const tab=document.createElement('button');
    tab.className='kd-tab'+(i===0?' active':'');
    tab.textContent=p.label;tab.onclick=()=>kdGo(i);
    tabs.appendChild(tab);
    const aiCnt=p.steps.filter(s=>s.ai).length;
    const div=document.createElement('div');
    div.className='kd-phase'+(i===0?' visible':'');
    div.innerHTML=`<div class="phase-hd"><div class="ph-icon">${p.icon}</div><div><p class="ph-name">${p.name}</p><p class="ph-desc">${p.desc}</p></div>${aiCnt>0?`<span class="ph-cnt">🤖 AI ช่วย ${aiCnt} ขั้น</span>`:''}</div><div class="steps-grid">${p.steps.map(s=>`<div class="step-card"><div class="step-top"><div class="step-num">${s.n}</div><span class="step-title">${s.t}</span></div><p class="step-desc">${s.d}</p>${s.ai?'<span class="ai-tag">🤖 AI ช่วยได้</span>':''}${s.warn?'<span class="warn-tag">⚠️ ข้อควรรู้</span>':''}</div>`).join('')}</div>`;
    phases.appendChild(div);
  });
  kdUpdateNav();
}
function kdGo(i){
  document.querySelectorAll('.kd-phase').forEach((el,idx)=>el.classList.toggle('visible',idx===i));
  document.querySelectorAll('.kd-tab').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  kdCur=i;kdUpdateNav();
}
function kdChange(d){kdGo(Math.max(0,Math.min(kdPhases.length-1,kdCur+d)));}
function kdUpdateNav(){
  document.getElementById('kd-prog').textContent=`ส่วนที่ ${kdCur+1} จาก ${kdPhases.length}`;
  document.getElementById('kd-prev').style.opacity=kdCur===0?'0.3':'1';
  document.getElementById('kd-next').textContent=kdCur===kdPhases.length-1?'🎉 เริ่มขายเลย!':'ถัดไป →';
}
kdBuild();
</script>
